<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Task Tree</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cpath d='M11 16h5m0 0V8h5m-5 8v8h5' stroke='%231c1c1a' stroke-width='1.5' fill='none'/%3E%3Crect x='3' y='12' width='8' height='8' rx='1.5' fill='%231c1c1a'/%3E%3Crect x='21' y='4' width='8' height='8' rx='1.5' fill='none' stroke='%23a8a8a2' stroke-width='1.5' stroke-dasharray='2 2'/%3E%3Crect x='21' y='20' width='8' height='8' rx='1.5' fill='%231a7a4f'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@500;600;700&family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root {
    --paper:   #f6f6f4;
    --surface: #ffffff;
    --ink:     #1c1c1a;
    --muted:   #6e6e68;
    --hair:    #e4e4df;
    --hair2:   #cfcfc8;
    --green:   #1a7a4f;
    --green-tint: #eef5f0;
  }
  html, body { margin: 0; padding: 0; background: var(--paper); }
  .lbl {
    font-family: "Schibsted Grotesk", ui-sans-serif, system-ui, sans-serif;
    font-size: 13.5px; line-height: 1.35; color: var(--ink);
    font-weight: 500; letter-spacing: 0;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .lbl-done { color: var(--ink); }
  .lbl-locked { color: var(--muted); font-weight: 400; }
  .del { opacity: 0; transition: opacity .12s; cursor: pointer; }
  .node:hover .del { opacity: 1; }
  .port { cursor: crosshair; touch-action: none; }
  .port circle:first-child { transition: stroke .12s, fill .12s; }
  .node:hover .port circle:first-child { stroke: var(--ink); }
  body.linking, body.linking * { cursor: crosshair !important; user-select: none; }
  .node rect { transition: stroke .12s, fill .12s; }
  button:focus-visible, input:focus-visible, select:focus-visible {
    outline: 2px solid var(--ink); outline-offset: 2px;
  }
  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; animation: none !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useMemo, useRef } = React;

/* ------------------------------------------------------------------
   Task Tree — left-to-right dependency graph.
   Prerequisites on the left, the goal on the right.
   State hierarchy is inverted on purpose: READY is the loudest state
   (solid ink border), done recedes to green, locked is dashed.
   Saves to localStorage. No build step, no server.
------------------------------------------------------------------- */

const NODE_W   = 240;
const NODE_H   = 84;
const RANK_GAP = 160;
const ROW_GAP  = 40;

const STORAGE_KEY    = "techtree:v2";
const OLD_KEY        = "techtree:graph";   // pre-multi-tree format, migrated on first load

const SEED = {
  nodes: [
    { id: "n1", label: "Async / turn-based mode", done: false },
    { id: "n2", label: "Fix landing copy", done: false },
    { id: "n3", label: "Post to r/LongDistance", done: false },
    { id: "n4", label: "A stranger couple plays twice in one week", done: false },
    { id: "n5", label: "2P Duel board", done: true },
  ],
  edges: [
    { from: "n5", to: "n1" },
    { from: "n1", to: "n3" },
    { from: "n2", to: "n3" },
    { from: "n3", to: "n4" },
  ],
};

/* ---------------- layout ---------------- */

function layout(nodes, edges) {
  const byId = Object.fromEntries(nodes.map(n => [n.id, n]));
  const incoming = Object.fromEntries(nodes.map(n => [n.id, []]));
  const outgoing = Object.fromEntries(nodes.map(n => [n.id, []]));
  edges.forEach(e => {
    // ignore self-loops and edges pointing at nodes that no longer exist
    if (byId[e.from] && byId[e.to] && e.from !== e.to) {
      outgoing[e.from].push(e.to);
      incoming[e.to].push(e.from);
    }
  });

  // Drop any back-edges so the graph is a genuine DAG before ranking.
  // The UI prevents cycles, but saved data or hand-edited JSON might contain one.
  const state = {};                            // 0 = unvisited, 1 = on stack, 2 = done
  const dropped = new Set();
  const dfs = id => {
    state[id] = 1;
    outgoing[id].forEach(next => {
      if (state[next] === 1) dropped.add(id + "\u0000" + next);   // back-edge
      else if (!state[next]) dfs(next);
    });
    state[id] = 2;
  };
  nodes.forEach(n => { if (!state[n.id]) dfs(n.id); });
  if (dropped.size) {
    nodes.forEach(n => {
      outgoing[n.id] = outgoing[n.id].filter(t => !dropped.has(n.id + "\u0000" + t));
      incoming[n.id] = incoming[n.id].filter(s => !dropped.has(s + "\u0000" + n.id));
    });
  }

  // longest-path ranking: a node sits one column right of its furthest prerequisite
  const rank = {};
  const compute = id => {
    if (rank[id] !== undefined) return rank[id];
    rank[id] = 0;                              // provisional, prevents re-entry
    const r = incoming[id].length ? Math.max(...incoming[id].map(compute)) + 1 : 0;
    rank[id] = r;
    return r;
  };
  nodes.forEach(n => compute(n.id));

  const cols = {};
  nodes.forEach(n => { (cols[rank[n.id]] = cols[rank[n.id]] || []).push(n.id); });

  // barycentre ordering to reduce edge crossings
  const rankKeys = Object.keys(cols).map(Number).sort((a, b) => a - b);
  const order = {};
  rankKeys.forEach(r => cols[r].forEach((id, i) => (order[id] = i)));
  for (let pass = 0; pass < 4; pass++) {
    rankKeys.slice(1).forEach(r => {
      cols[r].sort((a, b) => {
        const bc = id => incoming[id].length
          ? incoming[id].reduce((s, p) => s + (order[p] ?? 0), 0) / incoming[id].length
          : (order[id] ?? 0);
        return bc(a) - bc(b);
      });
      cols[r].forEach((id, i) => (order[id] = i));
    });
  }

  const tallest = Math.max(...rankKeys.map(r => cols[r].length), 1);
  const height  = Math.max(tallest * NODE_H + (tallest - 1) * ROW_GAP + 80, NODE_H + 80);

  const pos = {};
  rankKeys.forEach(r => {
    const list = cols[r];
    const colH = list.length * NODE_H + (list.length - 1) * ROW_GAP;
    const startY = (height - colH) / 2;
    list.forEach((id, i) => {
      pos[id] = { x: 48 + r * (NODE_W + RANK_GAP), y: startY + i * (NODE_H + ROW_GAP) };
    });
  });

  const width = 96 + (rankKeys.length || 1) * (NODE_W + RANK_GAP) - RANK_GAP;
  return { pos, incoming, outgoing, width, height };
}

/* ---------------- app ---------------- */

function TechTree() {
  const [nodes, setNodes]     = useState(SEED.nodes);
  const [edges, setEdges]     = useState(SEED.edges);
  const [loaded, setLoaded]   = useState(false);
  const [draft, setDraft]     = useState("");
  const [linkFrom, setLinkFrom] = useState(null);
  const [editing, setEditing] = useState(null);
  const [editText, setEditText] = useState("");
  const [status, setStatus]   = useState("");
  const [drag, setDrag]       = useState(null);   // {from, x, y, over} while dragging a link
  const [activeId, setActiveId] = useState("t1");
  const [treeNames, setTreeNames] = useState({ t1: "My tree" });
  const [treeModal, setTreeModal] = useState(null); // {mode:'new'|'rename', text}
  const svgRef = useRef(null);
  const allTrees = useRef({ t1: { name: "My tree", nodes: SEED.nodes, edges: SEED.edges } });

  /* load once — migrate old single-tree data if present */
  useEffect(() => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const blob = JSON.parse(raw);
        if (blob.trees && Object.keys(blob.trees).length) {
          allTrees.current = blob.trees;
          const act = blob.trees[blob.active] ? blob.active : Object.keys(blob.trees)[0];
          setActiveId(act);
          setTreeNames(Object.fromEntries(
            Object.entries(blob.trees).map(([id, t]) => [id, t.name || "Untitled"])
          ));
          setNodes(blob.trees[act].nodes || []);
          setEdges(blob.trees[act].edges || []);
        }
      } else {
        const old = localStorage.getItem(OLD_KEY);
        if (old) {
          const g = JSON.parse(old);
          if (Array.isArray(g.nodes) && g.nodes.length) {
            allTrees.current = { t1: { name: "My tree", nodes: g.nodes, edges: g.edges || [] } };
            setNodes(g.nodes);
            setEdges(g.edges || []);
          }
        }
      }
    } catch (err) {
      setStatus("Couldn't read saved data. Starting from the example tree.");
    }
    setLoaded(true);
  }, []);

  /* save on change: update the ref immediately, debounce only the disk write */
  useEffect(() => {
    if (!loaded) return;
    const t = allTrees.current[activeId];
    if (t) { t.nodes = nodes; t.edges = edges; }
    const timer = setTimeout(() => {
      try {
        localStorage.setItem(STORAGE_KEY,
          JSON.stringify({ active: activeId, trees: allTrees.current }));
      } catch (err) {
        setStatus("Changes aren't saving. They'll be lost on reload.");
      }
    }, 300);
    return () => clearTimeout(timer);
  }, [nodes, edges, activeId, loaded]);

  /* tree operations */
  const switchTree = id => {
    if (id === activeId || !allTrees.current[id]) return;
    setActiveId(id);
    setNodes(allTrees.current[id].nodes || []);
    setEdges(allTrees.current[id].edges || []);
    setLinkFrom(null); setDrag(null); setStatus("");
  };

  const createTree = name => {
    const id = "t" + Math.random().toString(36).slice(2, 9);
    allTrees.current[id] = { name, nodes: [], edges: [] };
    setTreeNames(n => ({ ...n, [id]: name }));
    switchTree(id);
  };

  const renameTree = name => {
    allTrees.current[activeId].name = name;
    setTreeNames(n => ({ ...n, [activeId]: name }));
  };

  const deleteTree = () => {
    const name = treeNames[activeId] || "this tree";
    if (!window.confirm(`Delete "${name}" and everything in it?`)) return;
    delete allTrees.current[activeId];
    setTreeNames(n => { const c = { ...n }; delete c[activeId]; return c; });
    const rest = Object.keys(allTrees.current);
    if (rest.length) {
      switchTree(rest[0]);
    } else {
      allTrees.current = { t1: { name: "My tree", nodes: [], edges: [] } };
      setTreeNames({ t1: "My tree" });
      setActiveId("t1");
      setNodes([]); setEdges([]);
    }
  };

  const commitTreeModal = () => {
    const name = treeModal.text.trim();
    if (name) {
      if (treeModal.mode === "new") createTree(name);
      else renameTree(name);
    }
    setTreeModal(null);
  };

  const { pos, incoming, outgoing, width, height } = useMemo(
    () => layout(nodes, edges), [nodes, edges]
  );

  const doneSet = useMemo(
    () => new Set(nodes.filter(n => n.done).map(n => n.id)), [nodes]
  );
  const ready = id => (incoming[id] || []).every(p => doneSet.has(p));

  /* mutations */
  const addNode = () => {
    const label = draft.trim();
    if (!label) return;
    const id = "n" + Math.random().toString(36).slice(2, 9);
    setNodes(n => [...n, { id, label, done: false }]);
    setDraft("");
  };

  const removeNode = id => {
    setNodes(n => n.filter(x => x.id !== id));
    setEdges(e => e.filter(x => x.from !== id && x.to !== id));
    setLinkFrom(f => (f === id ? null : f));
  };

  const toggle = id =>
    setNodes(n => n.map(x => (x.id === id ? { ...x, done: !x.done } : x)));

  const wouldCycle = (from, to) => {
    const seen = new Set();
    const walk = id => {
      if (id === from) return true;
      if (seen.has(id)) return false;
      seen.add(id);
      return (outgoing[id] || []).some(walk);
    };
    return walk(to);
  };

  const tryLink = (from, to) => {
    if (from === to) return;
    if (wouldCycle(from, to)) {
      setStatus("That would loop back on itself. Nothing could start.");
    } else if (edges.some(x => x.from === from && x.to === to)) {
      setStatus("Those are already linked.");
    } else {
      setEdges(x => [...x, { from, to }]);
      setStatus("");
    }
  };

  const handleNodeClick = (id, e) => {
    if (e.shiftKey) {
      if (linkFrom === null) {
        setLinkFrom(id);
        setStatus("Now shift-click the task this unlocks.");
      } else if (linkFrom === id) {
        setLinkFrom(null);
        setStatus("");
      } else {
        tryLink(linkFrom, id);
        setLinkFrom(null);
      }
      return;
    }
    toggle(id);
  };

  /* drag-to-link: start from a node's port, drop on another node */
  const svgPoint = e => {
    const r = svgRef.current.getBoundingClientRect();
    return { x: e.clientX - r.left, y: e.clientY - r.top };
  };

  const startDrag = (id, e) => {
    e.preventDefault();
    e.stopPropagation();
    const p = svgPoint(e);
    setDrag({ from: id, x: p.x, y: p.y, over: null });
  };

  useEffect(() => {
    if (!drag) return;
    document.body.classList.add("linking");
    const nodeUnder = e => {
      const el = document.elementFromPoint(e.clientX, e.clientY);
      const g = el && el.closest ? el.closest("[data-nodeid]") : null;
      const id = g ? g.getAttribute("data-nodeid") : null;
      return id && id !== drag.from ? id : null;
    };
    const move = e => {
      const p = svgPoint(e);
      setDrag(d => d && { ...d, x: p.x, y: p.y, over: nodeUnder(e) });
    };
    const up = e => {
      const target = nodeUnder(e);
      if (target) tryLink(drag.from, target);
      setDrag(null);
    };
    window.addEventListener("pointermove", move);
    window.addEventListener("pointerup", up);
    return () => {
      document.body.classList.remove("linking");
      window.removeEventListener("pointermove", move);
      window.removeEventListener("pointerup", up);
    };
  }, [drag && drag.from, edges]);

  const removeEdge = (from, to) =>
    setEdges(e => e.filter(x => !(x.from === from && x.to === to)));

  const startEdit = id => {
    const n = nodes.find(x => x.id === id);
    setEditing(id);
    setEditText(n.label);
  };

  const commitEdit = () => {
    const label = editText.trim();
    if (label) setNodes(n => n.map(x => (x.id === editing ? { ...x, label } : x)));
    setEditing(null);
  };

  useEffect(() => {
    const onKey = e => {
      if (e.key === "Escape") { setLinkFrom(null); setEditing(null); setDrag(null); setTreeModal(null); setStatus(""); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, []);

  const doneCount = nodes.filter(n => n.done).length;
  const nextUp = nodes.filter(n => !n.done && ready(n.id));
  const pct = nodes.length ? Math.round((doneCount / nodes.length) * 100) : 0;
  const pad = x => String(x).padStart(2, "0");

  const path = (a, b) => {
    const x1 = a.x + NODE_W, y1 = a.y + NODE_H / 2;
    const x2 = b.x,          y2 = b.y + NODE_H / 2;
    const dx = Math.max(50, (x2 - x1) * 0.5);
    return `M ${x1} ${y1} C ${x1 + dx} ${y1}, ${x2 - dx} ${y2}, ${x2} ${y2}`;
  };

  return (
    <div style={S.shell}>
      <header style={S.head}>
        <div style={{ flex: 1, minWidth: 220 }}>
          <h1 style={S.h1}>Task Tree</h1>
          <div style={S.sub}>what unlocks what</div>
          <div style={S.treeRow}>
            <select
              value={activeId}
              onChange={e => switchTree(e.target.value)}
              style={S.select}
              aria-label="Switch tree"
            >
              {Object.entries(treeNames).map(([id, name]) => (
                <option key={id} value={id}>{name}</option>
              ))}
            </select>
            <button style={S.treeBtn}
                    onClick={() => setTreeModal({ mode: "new", text: "" })}>
              New
            </button>
            <button style={S.treeBtn}
                    onClick={() => setTreeModal({ mode: "rename", text: treeNames[activeId] || "" })}>
              Rename
            </button>
            <button style={S.treeBtn} onClick={deleteTree}>
              Delete
            </button>
          </div>
        </div>
        <div style={S.progressWrap}>
          <div style={S.readout} aria-hidden="true">
            <span style={S.readoutNum}>{pad(doneCount)}</span>
            <span style={S.readoutDen}> / {pad(nodes.length)}</span>
          </div>
          <div style={S.readoutLabel}>tasks complete</div>
          <div style={S.track} role="progressbar" aria-valuenow={pct} aria-valuemin="0" aria-valuemax="100">
            <div style={{ ...S.fill, width: pct + "%" }} />
          </div>
        </div>
      </header>

      <div style={S.bar}>
        <input
          value={draft}
          onChange={e => setDraft(e.target.value)}
          onKeyDown={e => e.key === "Enter" && addNode()}
          placeholder="Add a task"
          style={S.input}
          aria-label="New task"
        />
        <button onClick={addNode} style={{...S.btn, opacity: draft.trim() ? 1 : 0.4}} disabled={!draft.trim()}>
          Add
        </button>
      </div>

      <div style={S.hintRow}>
        <span style={S.legend}>
          <span style={{...S.dot, background: "var(--green)", border: "1px solid var(--green)"}} /> done
        </span>
        <span style={S.legend}>
          <span style={{...S.dot, background: "var(--surface)", border: "2px solid var(--ink)"}} /> ready
        </span>
        <span style={S.legend}>
          <span style={{...S.dot, background: "var(--surface)", border: "1px dashed var(--hair2)"}} /> locked
        </span>
        <span style={S.hintText}>
          click = done &nbsp;·&nbsp; drag ○ to link &nbsp;·&nbsp; double-click = rename &nbsp;·&nbsp; click a line to unlink
        </span>
        {status && <span style={S.status}>{status}</span>}
      </div>

      {nodes.length === 0 ? (
        <div style={S.empty}>
          <div style={S.emptyTitle}>Nothing here yet</div>
          Add the end goal first, then work backwards to what it needs.
        </div>
      ) : (
        <div style={S.canvas}>
          <svg ref={svgRef} width={width} height={height} style={{ display: "block" }}>
            <defs>
              <marker id="ar" viewBox="0 0 8 8" refX="7" refY="4"
                      markerWidth="7" markerHeight="7" orient="auto">
                <path d="M0,0 L8,4 L0,8 z" fill="#c9c9c3" />
              </marker>
              <marker id="arLit" viewBox="0 0 8 8" refX="7" refY="4"
                      markerWidth="7" markerHeight="7" orient="auto">
                <path d="M0,0 L8,4 L0,8 z" fill="#1a7a4f" />
              </marker>
            </defs>

            {edges.map((e, i) => {
              const a = pos[e.from], b = pos[e.to];
              if (!a || !b) return null;
              const lit = doneSet.has(e.from);
              return (
                <g key={i} className="edge">
                  <path d={path(a, b)} fill="none"
                        stroke={lit ? "#1a7a4f" : "#c9c9c3"}
                        strokeWidth={lit ? 1.75 : 1.25}
                        strokeDasharray={lit ? undefined : "4 5"}
                        opacity={lit ? 0.9 : 0.8}
                        markerEnd={lit ? "url(#arLit)" : "url(#ar)"} />
                  <path d={path(a, b)} fill="none" stroke="transparent" strokeWidth="16"
                        style={{ cursor: "pointer" }}
                        onClick={() => removeEdge(e.from, e.to)}>
                    <title>Remove this link</title>
                  </path>
                </g>
              );
            })}

            {nodes.map(n => {
              const p = pos[n.id];
              if (!p) return null;
              const unlocked = ready(n.id);
              const isLink   = linkFrom === n.id;
              const isOver   = drag && drag.over === n.id;
              return (
                <g key={n.id} transform={`translate(${p.x},${p.y})`} className="node"
                   data-nodeid={n.id}
                   onClick={e => handleNodeClick(n.id, e)}
                   onDoubleClick={e => { e.stopPropagation(); startEdit(n.id); }}
                   style={{ cursor: "pointer" }}>
                  <rect width={NODE_W} height={NODE_H} rx="5"
                        fill={isOver ? "#f0f0ee" : n.done ? "#eef5f0" : "#ffffff"}
                        stroke={isOver || isLink ? "#1c1c1a"
                              : n.done ? "#1a7a4f"
                              : unlocked ? "#1c1c1a" : "#cfcfc8"}
                        strokeWidth={isOver ? 2.5 : isLink ? 2 : n.done ? 1 : unlocked ? 2 : 1}
                        strokeDasharray={!n.done && !unlocked ? "4 4" : undefined}
                        opacity={!n.done && !unlocked ? 0.6 : 1} />
                  {n.done && (
                    <path d="M 16 44 l 7 7 l 13 -15" fill="none" stroke="#1a7a4f"
                          strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />
                  )}
                  <foreignObject x={n.done ? 44 : 16} y="10"
                                 width={NODE_W - (n.done ? 64 : 36)} height={NODE_H - 20}
                                 style={{ pointerEvents: "none" }}>
                    <div xmlns="http://www.w3.org/1999/xhtml"
                         className={"lbl" + (n.done ? " lbl-done" : (!unlocked ? " lbl-locked" : ""))}>
                      {n.label}
                    </div>
                  </foreignObject>
                  <g className="port" onPointerDown={e => startDrag(n.id, e)}>
                    <circle cx={NODE_W} cy={NODE_H / 2} r="6"
                            fill="#ffffff" stroke="#cfcfc8" strokeWidth="1.5" />
                    <circle cx={NODE_W} cy={NODE_H / 2} r="14" fill="transparent" />
                    <title>Drag to another task to link them</title>
                  </g>
                  <g className="del"
                     onClick={e => { e.stopPropagation(); removeNode(n.id); }}>
                    <circle cx={NODE_W - 14} cy="14" r="10" fill="transparent" />
                    <path d={`M ${NODE_W - 18} 10 l 8 8 M ${NODE_W - 10} 10 l -8 8`}
                          stroke="#6e6e68" strokeWidth="1.5" strokeLinecap="round" />
                    <title>Delete task</title>
                  </g>
                </g>
              );
            })}

            {drag && (() => {
              const a = pos[drag.from];
              if (!a) return null;
              const x1 = a.x + NODE_W, y1 = a.y + NODE_H / 2;
              const dx = Math.max(40, Math.abs(drag.x - x1) * 0.5);
              return (
                <path d={`M ${x1} ${y1} C ${x1 + dx} ${y1}, ${drag.x - dx} ${drag.y}, ${drag.x} ${drag.y}`}
                      fill="none" stroke="#1c1c1a" strokeWidth="1.75"
                      strokeDasharray="5 5" opacity="0.7"
                      style={{ pointerEvents: "none" }} />
              );
            })()}
          </svg>
        </div>
      )}

      {nextUp.length > 0 && (
        <div style={S.next}>
          <span style={S.nextLabel}>Next up</span>
          {nextUp.map(n => (
            <button key={n.id} style={S.chip} onClick={() => toggle(n.id)}
                    title="Mark done">
              {n.label}
            </button>
          ))}
        </div>
      )}

      {treeModal && (
        <div style={S.overlay} onClick={() => setTreeModal(null)}>
          <div style={S.modal} onClick={e => e.stopPropagation()}>
            <label style={S.modalLabel}>
              {treeModal.mode === "new" ? "New tree" : "Rename tree"}
            </label>
            <input autoFocus value={treeModal.text}
                   placeholder="Tree name"
                   onChange={e => setTreeModal(m => ({ ...m, text: e.target.value }))}
                   onKeyDown={e => e.key === "Enter" && commitTreeModal()}
                   style={S.input} />
            <div style={{ display: "flex", gap: 8, marginTop: 14 }}>
              <button onClick={commitTreeModal} style={S.btn}>
                {treeModal.mode === "new" ? "Create" : "Save"}
              </button>
              <button onClick={() => setTreeModal(null)} style={S.btnGhost}>Cancel</button>
            </div>
          </div>
        </div>
      )}

      {editing && (
        <div style={S.overlay} onClick={() => setEditing(null)}>
          <div style={S.modal} onClick={e => e.stopPropagation()}>
            <label style={S.modalLabel}>Rename task</label>
            <input autoFocus value={editText}
                   onChange={e => setEditText(e.target.value)}
                   onKeyDown={e => e.key === "Enter" && commitEdit()}
                   style={S.input} />
            <div style={{ display: "flex", gap: 8, marginTop: 14 }}>
              <button onClick={commitEdit} style={S.btn}>Save</button>
              <button onClick={() => setEditing(null)} style={S.btnGhost}>Cancel</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}
