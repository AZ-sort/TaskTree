<!DOCTYPE html>
<html lang="en">
<head>

<title>Task Tree</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cpath d='M11 16h5m0 0V8h5m-5 8v8h5' stroke='%23e6eaf0' stroke-width='1.5' fill='none'/%3E%3Crect x='3' y='12' width='8' height='8' rx='2' fill='%23e6eaf0'/%3E%3Crect x='21' y='4' width='8' height='8' rx='2' fill='none' stroke='%235f6d80' stroke-width='1.5' stroke-dasharray='2 2'/%3E%3Crect x='21' y='20' width='8' height='8' rx='2' fill='%23f0a93c'/%3E%3C/svg%3E">

<style>
  :root {
    --field:    #1a2230;
    --rail:     #202a3a;
    --surface:  #273345;
    --surface2: #2f3d52;
    --line:     #38455c;
    --line2:    #47566f;
    --text:     #eef1f6;
    --text2:    #9ba7b8;
    --text3:    #758394;
    --amber:    #f0a93c;
    --amber-dim:#8a6320;
    --done:     #5a90a4;
    --done-dim: #24404a;

    /* spacing: 4px base — every gap/padding snaps to this scale */
    --s1: 4px;  --s2: 8px;  --s3: 12px; --s4: 16px;
    --s5: 24px; --s6: 32px; --s7: 48px;

    /* radius: two values only — controls vs cards */
    --r-ctl:  8px;
    --r-card: 12px;

    /* type scale: 6 steps, clear ratios */
    --t-micro: 11px;   /* mono labels, legend */
    --t-small: 13px;   /* secondary UI, rail items */
    --t-body:  15px;   /* inputs, node labels, body */
    --t-lead:  20px;   /* rail stat */
    --t-h2:    28px;   /* empty state */
    --t-h1:    36px;   /* tree title */
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--field); height: 100%; }
  #root { height: 100%; }
  .lbl {
    font-family: "Instrument Sans", ui-sans-serif, system-ui, sans-serif;
    font-size: 14px; line-height: 1.35; color: var(--text);
    font-weight: 500; letter-spacing: -0.01em;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .lbl-locked { color: var(--text3); font-weight: 400; }
  .lbl-done { color: #b3c9d2; }
  .del { opacity: 0; transition: opacity .14s; cursor: pointer; }
  .node:hover .del { opacity: 1; }
  .port { cursor: crosshair; touch-action: none; }
  .grip { cursor: ns-resize; touch-action: none; opacity: 0; transition: opacity .14s; }
  .node:hover .grip { opacity: 1; }
  .port circle:first-child { transition: stroke .14s, fill .14s; }
  .node:hover .port circle:first-child { stroke: var(--amber); fill: var(--amber); }
  body.linking, body.linking * { cursor: crosshair !important; user-select: none; }
  .node rect { transition: stroke .14s, fill .14s; }
  .node:hover rect { fill: var(--surface2); }
  body.linking .node:hover rect { fill: inherit; }
  .railbtn { transition: background .14s, color .14s, border-color .14s; }
  .railbtn:hover { border-color: var(--line2); }
  .railbtn:hover { background: var(--surface); color: var(--text); }
  .chip { transition: border-color .14s, background .14s; }
  .nextitem:hover { border-color: var(--line2); background: var(--surface2); }
  .nextitem:hover .ring { background: var(--amber); }
  .chip:hover { border-color: var(--line2); background: var(--surface2); }
  button:focus-visible, input:focus-visible, select:focus-visible {
    outline: 2px solid var(--amber); outline-offset: 2px;
  }
  ::placeholder { color: var(--text3); }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
  @media (max-width: 720px) {
    .shell { flex-direction: column !important; }
    .rail { width: 100% !important; height: auto !important; }
  }

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useMemo, useRef } = React;

/* ------------------------------------------------------------------
   Task Tree — left-to-right dependency graph.
   Prerequisites on the left, the goal on the right.
   READY is the loudest state: the tool's job is showing what's next.
   Saves to localStorage. No build step, no server.
------------------------------------------------------------------- */

const NODE_W   = 250;
const NODE_H   = 88;
const RANK_GAP = 150;
const ROW_GAP  = 38;

const STORAGE_KEY = "techtree:v2";
const OLD_KEY     = "techtree:graph";   // pre-multi-tree format, migrated on first load

const SEED = {
  nodes: [
    { id: "n1", label: "Async / turn-based mode", done: false },
    { id: "n2", label: "Fix landing copy", done: false },
    { id: "n3", label: "Post to r/LongDistance", done: false },
    { id: "n4", label: "A stranger couple plays twice in one week", done: false },
    { id: "n5", label: "2P Duel board", done: true },
  ],
  edges: [
    { from: "n5", to: "n1" },
    { from: "n1", to: "n3" },
    { from: "n2", to: "n3" },
    { from: "n3", to: "n4" },
  ],
};

/* ---------------- layout ---------------- */

function layout(nodes, edges) {
  const byId = Object.fromEntries(nodes.map(n => [n.id, n]));
  const incoming = Object.fromEntries(nodes.map(n => [n.id, []]));
  const outgoing = Object.fromEntries(nodes.map(n => [n.id, []]));
  edges.forEach(e => {
    // ignore self-loops and edges pointing at nodes that no longer exist
    if (byId[e.from] && byId[e.to] && e.from !== e.to) {
      outgoing[e.from].push(e.to);
      incoming[e.to].push(e.from);
    }
  });

  // Drop any back-edges so the graph is a genuine DAG before ranking.
  // The UI prevents cycles, but saved data or hand-edited JSON might contain one.
  const state = {};                            // 0 = unvisited, 1 = on stack, 2 = done
  const dropped = new Set();
  const dfs = id => {
    state[id] = 1;
    outgoing[id].forEach(next => {
      if (state[next] === 1) dropped.add(id + "\u0000" + next);   // back-edge
      else if (!state[next]) dfs(next);
    });
    state[id] = 2;
  };
  nodes.forEach(n => { if (!state[n.id]) dfs(n.id); });
  if (dropped.size) {
    nodes.forEach(n => {
      outgoing[n.id] = outgoing[n.id].filter(t => !dropped.has(n.id + "\u0000" + t));
      incoming[n.id] = incoming[n.id].filter(s => !dropped.has(s + "\u0000" + n.id));
    });
  }

  // longest-path ranking: a node sits one column right of its furthest prerequisite
  const rank = {};
  const compute = id => {
    if (rank[id] !== undefined) return rank[id];
    rank[id] = 0;                              // provisional, prevents re-entry
    const r = incoming[id].length ? Math.max(...incoming[id].map(compute)) + 1 : 0;
    rank[id] = r;
    return r;
  };
  nodes.forEach(n => compute(n.id));

  // ---- virtual nodes: an edge spanning >1 column gets a waypoint in each
  // column it crosses. Waypoints occupy a slot in row-packing exactly like real
  // nodes, so long edges route *around* nodes instead of through them.
  const virt = {};                 // edgeKey -> [{id, rank}] waypoints in order
  const isVirt = {};
  const realEdges = [];
  edges.forEach(e => {
    if (!byId[e.from] || !byId[e.to] || e.from === e.to) return;
    if (dropped.has(e.from + "\u0000" + e.to)) return;
    const r1 = rank[e.from], r2 = rank[e.to];
    realEdges.push(e);
    if (r2 - r1 > 1) {
      const key = e.from + "\u0000" + e.to;
      virt[key] = [];
      for (let r = r1 + 1; r < r2; r++) {
        const vid = "\u0001v:" + key + ":" + r;
        virt[key].push({ id: vid, rank: r });
        isVirt[vid] = true;
        rank[vid] = r;
      }
    }
  });

  // columns include virtual nodes
  const cols = {};
  nodes.forEach(n => { (cols[rank[n.id]] = cols[rank[n.id]] || []).push(n.id); });
  Object.values(virt).forEach(list =>
    list.forEach(v => { (cols[v.rank] = cols[v.rank] || []).push(v.id); })
  );

  // chain adjacency including waypoints, used for barycentre ordering
  const inAdj  = {};
  const outAdj = {};
  const link = (a, b) => {
    (outAdj[a] = outAdj[a] || []).push(b);
    (inAdj[b]  = inAdj[b]  || []).push(a);
  };
  realEdges.forEach(e => {
    const key = e.from + "\u0000" + e.to;
    const chain = virt[key];
    if (!chain || !chain.length) { link(e.from, e.to); return; }
    link(e.from, chain[0].id);
    for (let i = 0; i < chain.length - 1; i++) link(chain[i].id, chain[i + 1].id);
    link(chain[chain.length - 1].id, e.to);
  });

  // ---- ordering within each column ----
  // Nodes carrying an explicit `order` are pinned there (manual reorder);
  // everything else is placed by barycentre, then appended in a stable way.
  const rankKeys = Object.keys(cols).map(Number).sort((a, b) => a - b);
  const pinned = {};
  nodes.forEach(n => { if (typeof n.order === "number") pinned[n.id] = n.order; });

  const order = {};
  rankKeys.forEach(r => cols[r].forEach((id, i) => (order[id] = i)));
  for (let pass = 0; pass < 4; pass++) {
    rankKeys.slice(1).forEach(r => {
      cols[r].sort((a, b) => {
        const bc = id => (inAdj[id] && inAdj[id].length)
          ? inAdj[id].reduce((s, p) => s + (order[p] ?? 0), 0) / inAdj[id].length
          : (order[id] ?? 0);
        return bc(a) - bc(b);
      });
      cols[r].forEach((id, i) => (order[id] = i));
    });
  }

  // apply pins last so manual placement always wins
  rankKeys.forEach(r => {
    const list = cols[r];
    const hasPin = list.some(id => pinned[id] !== undefined);
    if (!hasPin) return;
    list.sort((a, b) => {
      const pa = pinned[a], pb = pinned[b];
      if (pa !== undefined && pb !== undefined) return pa - pb;
      if (pa !== undefined) return -1;            // pinned rise above unpinned
      if (pb !== undefined) return 1;
      return (order[a] ?? 0) - (order[b] ?? 0);   // unpinned keep barycentre order
    });
    list.forEach((id, i) => (order[id] = i));
  });

  const tallest = Math.max(...rankKeys.map(r => cols[r].length), 1);
  const height  = Math.max(tallest * NODE_H + (tallest - 1) * ROW_GAP + 80, NODE_H + 80);

  const pos = {};      // real nodes
  const vpos = {};     // waypoint centres
  rankKeys.forEach(r => {
    const list = cols[r];
    const colH = list.length * NODE_H + (list.length - 1) * ROW_GAP;
    const startY = (height - colH) / 2;
    list.forEach((id, i) => {
      const x = 48 + r * (NODE_W + RANK_GAP);
      const y = startY + i * (NODE_H + ROW_GAP);
      if (isVirt[id]) vpos[id] = { x: x + NODE_W / 2, y: y + NODE_H / 2 };
      else pos[id] = { x, y };
    });
  });

  // waypoint centres per edge, for drawing
  const waypoints = {};
  Object.entries(virt).forEach(([key, list]) => {
    waypoints[key] = list.map(v => vpos[v.id]).filter(Boolean);
  });

  // column membership of real nodes, for reorder controls
  const columns = {};
  rankKeys.forEach(r => {
    const reals = cols[r].filter(id => !isVirt[id]);
    if (reals.length) columns[r] = reals;
  });
  const rankOf = {};
  nodes.forEach(n => { rankOf[n.id] = rank[n.id]; });

  const width = 96 + (rankKeys.length || 1) * (NODE_W + RANK_GAP) - RANK_GAP;
  return { pos, incoming, outgoing, width, height, waypoints, columns, rankOf };
}

/* ---------------- app ---------------- */

function TechTree() {
  const [nodes, setNodes]     = useState(SEED.nodes);
  const [edges, setEdges]     = useState(SEED.edges);
  const [loaded, setLoaded]   = useState(false);
  const [draft, setDraft]     = useState("");
  const [linkFrom, setLinkFrom] = useState(null);
  const [editing, setEditing] = useState(null);
  const [editText, setEditText] = useState("");
  const [status, setStatus]   = useState("");
  const [drag, setDrag]       = useState(null);   // {from, x, y, over} while dragging a link
  const [vdrag, setVdrag]     = useState(null);   // {id, rank, startY, dy} while reordering a column
  const [activeId, setActiveId] = useState("t1");
  const [treeNames, setTreeNames] = useState({ t1: "My tree" });
  const [treeModal, setTreeModal] = useState(null); // {mode:'new'|'rename', text}
  const svgRef = useRef(null);
  const allTrees = useRef({ t1: { name: "My tree", nodes: SEED.nodes, edges: SEED.edges } });

  /* load once — migrate old single-tree data if present */
  useEffect(() => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const blob = JSON.parse(raw);
        if (blob.trees && Object.keys(blob.trees).length) {
          allTrees.current = blob.trees;
          const act = blob.trees[blob.active] ? blob.active : Object.keys(blob.trees)[0];
          setActiveId(act);
          setTreeNames(Object.fromEntries(
            Object.entries(blob.trees).map(([id, t]) => [id, t.name || "Untitled"])
          ));
          setNodes(blob.trees[act].nodes || []);
          setEdges(blob.trees[act].edges || []);
        }
      } else {
        const old = localStorage.getItem(OLD_KEY);
        if (old) {
          const g = JSON.parse(old);
          if (Array.isArray(g.nodes) && g.nodes.length) {
            allTrees.current = { t1: { name: "My tree", nodes: g.nodes, edges: g.edges || [] } };
            setNodes(g.nodes);
            setEdges(g.edges || []);
          }
        }
      }
    } catch (err) {
      setStatus("Couldn't read saved data. Starting from the example tree.");
    }
    setLoaded(true);
  }, []);

  /* save on change: update the ref immediately, debounce only the disk write */
  useEffect(() => {
    if (!loaded) return;
    const t = allTrees.current[activeId];
    if (t) { t.nodes = nodes; t.edges = edges; }
    const timer = setTimeout(() => {
      try {
        localStorage.setItem(STORAGE_KEY,
          JSON.stringify({ active: activeId, trees: allTrees.current }));
      } catch (err) {
        setStatus("Changes aren't saving. They'll be lost on reload.");
      }
    }, 300);
    return () => clearTimeout(timer);
  }, [nodes, edges, activeId, loaded]);

  /* tree operations */
  const switchTree = id => {
    if (id === activeId || !allTrees.current[id]) return;
    setActiveId(id);
    setNodes(allTrees.current[id].nodes || []);
    setEdges(allTrees.current[id].edges || []);
    setLinkFrom(null); setDrag(null); setStatus("");
  };

  const createTree = name => {
    const id = "t" + Math.random().toString(36).slice(2, 9);
    allTrees.current[id] = { name, nodes: [], edges: [] };
    setTreeNames(n => ({ ...n, [id]: name }));
    switchTree(id);
  };

  const renameTree = name => {
    allTrees.current[activeId].name = name;
    setTreeNames(n => ({ ...n, [activeId]: name }));
  };

  const deleteTree = () => {
    const name = treeNames[activeId] || "this tree";
    if (!window.confirm(`Delete "${name}" and everything in it?`)) return;
    delete allTrees.current[activeId];
    setTreeNames(n => { const c = { ...n }; delete c[activeId]; return c; });
    const rest = Object.keys(allTrees.current);
    if (rest.length) {
      switchTree(rest[0]);
    } else {
      allTrees.current = { t1: { name: "My tree", nodes: [], edges: [] } };
      setTreeNames({ t1: "My tree" });
      setActiveId("t1");
      setNodes([]); setEdges([]);
    }
  };

  const commitTreeModal = () => {
    const name = treeModal.text.trim();
    if (name) {
      if (treeModal.mode === "new") createTree(name);
      else renameTree(name);
    }
    setTreeModal(null);
  };

  const { pos, incoming, outgoing, width, height, waypoints, columns, rankOf } = useMemo(
    () => layout(nodes, edges), [nodes, edges]
  );

  const doneSet = useMemo(
    () => new Set(nodes.filter(n => n.done).map(n => n.id)), [nodes]
  );
  const ready = id => (incoming[id] || []).every(p => doneSet.has(p));

  /* mutations */
  const addNode = () => {
    const label = draft.trim();
    if (!label) return;
    const id = "n" + Math.random().toString(36).slice(2, 9);
    setNodes(n => [...n, { id, label, done: false }]);
    setDraft("");
  };

  const removeNode = id => {
    setNodes(n => n.filter(x => x.id !== id));
    setEdges(e => e.filter(x => x.from !== id && x.to !== id));
    setLinkFrom(f => (f === id ? null : f));
  };

  const toggle = id =>
    setNodes(n => n.map(x => (x.id === id ? { ...x, done: !x.done } : x)));

  /* reorder a node within its column; writes an explicit `order` on every
     node in that column so the arrangement sticks across relayouts */
  const moveInColumn = (id, delta) => {
    const r = rankOf[id];
    const col = (columns[r] || []).slice();
    const i = col.indexOf(id);
    const j = i + delta;
    if (i < 0 || j < 0 || j >= col.length) return;
    col.splice(j, 0, col.splice(i, 1)[0]);
    setNodes(ns => ns.map(n => {
      const k = col.indexOf(n.id);
      return k === -1 ? n : { ...n, order: k };
    }));
  };

  const wouldCycle = (from, to) => {
    const seen = new Set();
    const walk = id => {
      if (id === from) return true;
      if (seen.has(id)) return false;
      seen.add(id);
      return (outgoing[id] || []).some(walk);
    };
    return walk(to);
  };

  const tryLink = (from, to) => {
    if (from === to) return;
    if (wouldCycle(from, to)) {
      setStatus("That would loop back on itself. Nothing could start.");
    } else if (edges.some(x => x.from === from && x.to === to)) {
      setStatus("Those are already linked.");
    } else {
      setEdges(x => [...x, { from, to }]);
      setStatus("");
    }
  };

  const handleNodeClick = (id, e) => {
    if (e.shiftKey) {
      if (linkFrom === null) {
        setLinkFrom(id);
        setStatus("Now shift-click the task this unlocks.");
      } else if (linkFrom === id) {
        setLinkFrom(null);
        setStatus("");
      } else {
        tryLink(linkFrom, id);
        setLinkFrom(null);
      }
      return;
    }
    toggle(id);
  };

  /* drag-to-link: start from a node's port, drop on another node */
  const svgPoint = e => {
    const r = svgRef.current.getBoundingClientRect();
    return { x: e.clientX - r.left, y: e.clientY - r.top };
  };

  const startDrag = (id, e) => {
    e.preventDefault();
    e.stopPropagation();
    const p = svgPoint(e);
    setDrag({ from: id, x: p.x, y: p.y, over: null });
  };

  useEffect(() => {
    if (!drag) return;
    document.body.classList.add("linking");
    const nodeUnder = e => {
      const el = document.elementFromPoint(e.clientX, e.clientY);
      const g = el && el.closest ? el.closest("[data-nodeid]") : null;
      const id = g ? g.getAttribute("data-nodeid") : null;
      return id && id !== drag.from ? id : null;
    };
    const move = e => {
      const p = svgPoint(e);
      setDrag(d => d && { ...d, x: p.x, y: p.y, over: nodeUnder(e) });
    };
    const up = e => {
      const target = nodeUnder(e);
      if (target) tryLink(drag.from, target);
      setDrag(null);
    };
    window.addEventListener("pointermove", move);
    window.addEventListener("pointerup", up);
    return () => {
      document.body.classList.remove("linking");
      window.removeEventListener("pointermove", move);
      window.removeEventListener("pointerup", up);
    };
  }, [drag && drag.from, edges]);

  /* drag a node up/down to reorder it within its column */
  const startVDrag = (id, e) => {
    e.preventDefault();
    e.stopPropagation();
    setVdrag({ id, rank: rankOf[id], startY: e.clientY, dy: 0 });
  };

  useEffect(() => {
    if (!vdrag) return;
    document.body.classList.add("linking");
    const step = NODE_H + ROW_GAP;
    const move = e => {
      const dy = e.clientY - vdrag.startY;
      setVdrag(v => v && { ...v, dy });
      const shift = Math.round(dy / step);
      if (shift !== 0) {
        moveInColumn(vdrag.id, shift > 0 ? 1 : -1);
        setVdrag(v => v && { ...v, startY: v.startY + (shift > 0 ? step : -step), dy: 0 });
      }
    };
    const up = () => setVdrag(null);
    window.addEventListener("pointermove", move);
    window.addEventListener("pointerup", up);
    return () => {
      document.body.classList.remove("linking");
      window.removeEventListener("pointermove", move);
      window.removeEventListener("pointerup", up);
    };
  }, [vdrag && vdrag.id, vdrag && vdrag.startY, columns, rankOf]);

  const removeEdge = (from, to) =>
    setEdges(e => e.filter(x => !(x.from === from && x.to === to)));

  const startEdit = id => {
    const n = nodes.find(x => x.id === id);
    setEditing(id);
    setEditText(n.label);
  };

  const commitEdit = () => {
    const label = editText.trim();
    if (label) setNodes(n => n.map(x => (x.id === editing ? { ...x, label } : x)));
    setEditing(null);
  };

  useEffect(() => {
    const onKey = e => {
      if (e.key === "Escape") { setLinkFrom(null); setEditing(null); setDrag(null); setVdrag(null); setTreeModal(null); setStatus(""); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, []);

  const doneCount = nodes.filter(n => n.done).length;
  const nextUp = nodes.filter(n => !n.done && ready(n.id));
  const pct = nodes.length ? Math.round((doneCount / nodes.length) * 100) : 0;

  // Draw an edge from a to b. If the edge spans more than one column it is
  // routed through its waypoints so it curves around intervening nodes.
  const path = (a, b, wps) => {
    const x1 = a.x + NODE_W, y1 = a.y + NODE_H / 2;
    const x2 = b.x,          y2 = b.y + NODE_H / 2;
    if (!wps || !wps.length) {
      const dx = Math.max(50, (x2 - x1) * 0.5);
      return `M ${x1} ${y1} C ${x1 + dx} ${y1}, ${x2 - dx} ${y2}, ${x2} ${y2}`;
    }
    // Each waypoint sits at the centre of a reserved slot in an intermediate
    // column. To avoid clipping that column's other nodes, the route travels
    // strictly horizontally across the width of each column band and only
    // changes y inside the gaps between columns.
    const pts = [{ x: x1, y: y1 }];
    wps.forEach(w => {
      pts.push({ x: w.x - NODE_W / 2, y: w.y });   // enter the column band
      pts.push({ x: w.x + NODE_W / 2, y: w.y });   // leave the column band
    });
    pts.push({ x: x2, y: y2 });

    let d = `M ${pts[0].x} ${pts[0].y}`;
    for (let i = 0; i < pts.length - 1; i++) {
      const p1 = pts[i], p2 = pts[i + 1];
      if (Math.abs(p1.y - p2.y) < 0.5) {
        d += ` L ${p2.x} ${p2.y}`;                 // straight run across a column
      } else {
        const dx = Math.max(18, (p2.x - p1.x) * 0.5);
        d += ` C ${p1.x + dx} ${p1.y}, ${p2.x - dx} ${p2.y}, ${p2.x} ${p2.y}`;
      }
    }
    return d;
  };
  const wpsFor = e => waypoints[e.from + "\u0000" + e.to];

  return (
    <div className="shell" style={S.shell}>

      {/* ---- left rail: the things you act with ---- */}
      <aside className="rail" style={S.rail}>
        <div style={S.brand}>
          <svg width="20" height="20" viewBox="0 0 32 32" style={{ flexShrink: 0 }}>
            <path d="M11 16h5m0 0V8h5m-5 8v8h5" stroke="#eef1f6" strokeWidth="1.5" fill="none"/>
            <rect x="3" y="12" width="8" height="8" rx="2" fill="#eef1f6"/>
            <rect x="21" y="4" width="8" height="8" rx="2" fill="none" stroke="#758394" strokeWidth="1.5" strokeDasharray="2 2"/>
            <rect x="21" y="20" width="8" height="8" rx="2" fill="#f0a93c"/>
          </svg>
          <span style={S.brandName}>Task Tree</span>
        </div>

        <div style={S.railSection}>
          <div style={S.railLabel}>Tree</div>
          <select value={activeId} onChange={e => switchTree(e.target.value)}
                  style={S.select} aria-label="Switch tree">
            {Object.entries(treeNames).map(([id, name]) => (
              <option key={id} value={id}>{name}</option>
            ))}
          </select>
          <div style={S.railBtnRow}>
            <button className="railbtn" style={S.railBtn}
                    onClick={() => setTreeModal({ mode: "new", text: "" })}>New</button>
            <button className="railbtn" style={S.railBtn}
                    onClick={() => setTreeModal({ mode: "rename", text: treeNames[activeId] || "" })}>Rename</button>
            <button className="railbtn" style={S.railBtn} onClick={deleteTree}>Delete</button>
          </div>
        </div>

        <div style={S.railSection}>
          <div style={S.railLabel}>Add task</div>
          <input value={draft} onChange={e => setDraft(e.target.value)}
                 onKeyDown={e => e.key === "Enter" && addNode()}
                 placeholder="What needs doing?"
                 style={S.railInput} aria-label="New task" />
          <button onClick={addNode} disabled={!draft.trim()}
                  style={{ ...S.addBtn, opacity: draft.trim() ? 1 : 0.35 }}>
            Add to tree
          </button>
        </div>

        <div style={{ ...S.railSection, flex: 1, minHeight: 0, overflowY: "auto" }}>
          <div style={S.railLabel}>
            Next up {nextUp.length > 0 && <span style={S.badge}>{nextUp.length}</span>}
          </div>
          {nextUp.length === 0 ? (
            <div style={S.railEmpty}>
              {nodes.length === 0 ? "No tasks yet." : "Everything's either done or blocked."}
            </div>
          ) : (
            nextUp.map(n => (
              <button key={n.id} onClick={() => toggle(n.id)}
                      className="nextitem" style={S.nextItem}
                      title="Mark done">
                <span className="ring" style={S.ring} />
                <span>{n.label}</span>
              </button>
            ))
          )}
        </div>

        <div style={S.railFoot}>
          <div style={S.railLabel}>Progress</div>
          <div style={S.railStat}>
            <span style={S.railStatNum}>{doneCount}</span>
            <span style={S.railStatDen}>/{nodes.length}</span>
            <span style={S.railPct}>{pct}%</span>
          </div>
          <div style={S.track} role="progressbar" aria-valuenow={pct} aria-valuemin="0" aria-valuemax="100">
            <div style={{ ...S.fill, width: pct + "%" }} />
          </div>
        </div>
      </aside>

      {/* ---- workspace ---- */}
      <main style={S.main}>
        <div style={S.topbar}>
          <h1 style={S.title}>{treeNames[activeId] || "Untitled"}</h1>
          <div style={S.topRight}>
            {status
              ? <span style={S.status}>{status}</span>
              : <span style={S.hint}>click = done · drag ○ to link · drag ⣿ to reorder · double-click = rename</span>}
            <span style={S.legendGroup}>
              <span style={S.legend}><span style={{...S.dot, background: "var(--done)", borderColor: "var(--done)"}} />done</span>
              <span style={S.legend}><span style={{...S.dot, borderWidth: 2, borderColor: "var(--amber)"}} />ready</span>
              <span style={S.legend}><span style={{...S.dot, borderStyle: "dashed", borderColor: "var(--line2)"}} />locked</span>
            </span>
          </div>
        </div>

        {nodes.length === 0 ? (
          <div style={S.emptyWrap}>
            <div style={S.emptyInner}>
              <h2 style={S.emptyTitle}>Start with the end.</h2>
              <p style={S.emptyBody}>
                Add the goal you're working toward, then add what it depends on and
                link them. The tree lays itself out — prerequisites left, goal right.
              </p>
            </div>
          </div>
        ) : (
          <div style={S.canvasWrap}>
            <svg ref={svgRef} width={width} height={height} style={{ display: "block" }}>
              <defs>
                <marker id="ar" viewBox="0 0 8 8" refX="7" refY="4"
                        markerWidth="7" markerHeight="7" orient="auto">
                  <path d="M0,0 L8,4 L0,8 z" fill="#4a586d" />
                </marker>
                <marker id="arLit" viewBox="0 0 8 8" refX="7" refY="4"
                        markerWidth="7" markerHeight="7" orient="auto">
                  <path d="M0,0 L8,4 L0,8 z" fill="#5a90a4" />
                </marker>
              </defs>

              {edges.map((e, i) => {
                const a = pos[e.from], b = pos[e.to];
                if (!a || !b) return null;
                const lit = doneSet.has(e.from);
                return (
                  <g key={i} className="edge">
                    <path d={path(a, b, wpsFor(e))} fill="none"
                          stroke={lit ? "#5a90a4" : "#4a586d"}
                          strokeWidth={lit ? 1.75 : 1.25}
                          strokeDasharray={lit ? undefined : "4 5"}
                          opacity={lit ? 0.9 : 0.85}
                          markerEnd={lit ? "url(#arLit)" : "url(#ar)"} />
                    <path d={path(a, b, wpsFor(e))} fill="none" stroke="transparent" strokeWidth="16"
                          style={{ cursor: "pointer" }}
                          onClick={() => removeEdge(e.from, e.to)}>
                      <title>Remove this link</title>
                    </path>
                  </g>
                );
              })}

              {nodes.map(n => {
                const p = pos[n.id];
                if (!p) return null;
                const unlocked = ready(n.id);
                const isLink   = linkFrom === n.id;
                const isOver   = drag && drag.over === n.id;
                const isMoving = vdrag && vdrag.id === n.id;
                return (
                  <g key={n.id}
                     transform={`translate(${p.x},${p.y + (isMoving ? vdrag.dy : 0)})`}
                     className="node" opacity={isMoving ? 0.9 : 1}
                     data-nodeid={n.id}
                     onClick={e => handleNodeClick(n.id, e)}
                     onDoubleClick={e => { e.stopPropagation(); startEdit(n.id); }}
                     style={{ cursor: "pointer" }}>
                    <rect width={NODE_W} height={NODE_H} rx="12"
                          fill={isOver ? "#3d5170" : n.done ? "#263a44" : unlocked ? "#2b374a" : "#232e3f"}
                          stroke={isOver || isLink ? "#eef1f6"
                                : n.done ? "#5a90a4"
                                : unlocked ? "#f0a93c" : "#3d4b61"}
                          strokeWidth={isOver || isLink ? 2 : n.done ? 1 : unlocked ? 2 : 1}
                          strokeDasharray={!n.done && !unlocked ? "5 4" : undefined}
                          opacity={!n.done && !unlocked ? 0.65 : 1} />
                    {n.done && (
                      <path d="M 18 45 l 7 7 l 13 -15" fill="none" stroke="#7fb3c4"
                            strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />
                    )}
                    <foreignObject x={n.done ? 48 : 18} y="12"
                                   width={NODE_W - (n.done ? 68 : 40)} height={NODE_H - 24}
                                   style={{ pointerEvents: "none" }}>
                      <div xmlns="http://www.w3.org/1999/xhtml"
                           className={"lbl" + (n.done ? " lbl-done" : (!unlocked ? " lbl-locked" : ""))}>
                        {n.label}
                      </div>
                    </foreignObject>
                    {(columns[rankOf[n.id]] || []).length > 1 && (
                      <g className="grip" onPointerDown={e => startVDrag(n.id, e)}>
                        <rect x="-22" y={NODE_H / 2 - 16} width="22" height="32" fill="transparent" />
                        <g stroke="#758394" strokeWidth="1.25" strokeLinecap="round">
                          <path d={`M -14 ${NODE_H/2 - 5} h 6`} />
                          <path d={`M -14 ${NODE_H/2} h 6`} />
                          <path d={`M -14 ${NODE_H/2 + 5} h 6`} />
                        </g>
                        <title>Drag up or down to reorder within this column</title>
                      </g>
                    )}
                    <g className="port" onPointerDown={e => startDrag(n.id, e)}>
                      <circle cx={NODE_W} cy={NODE_H / 2} r="6"
                              fill="#273345" stroke="#4a586d" strokeWidth="1" />
                      <circle cx={NODE_W} cy={NODE_H / 2} r="14" fill="transparent" />
                      <title>Drag to another task to link them</title>
                    </g>
                    <g className="del"
                       onClick={e => { e.stopPropagation(); removeNode(n.id); }}>
                      <circle cx={NODE_W - 15} cy="15" r="10" fill="transparent" />
                      <path d={`M ${NODE_W - 19} 11 l 8 8 M ${NODE_W - 11} 11 l -8 8`}
                            stroke="#8394a6" strokeWidth="1.25" strokeLinecap="round" />
                      <title>Delete task</title>
                    </g>
                  </g>
                );
              })}

              {drag && (() => {
                const a = pos[drag.from];
                if (!a) return null;
                const x1 = a.x + NODE_W, y1 = a.y + NODE_H / 2;
                const dx = Math.max(40, Math.abs(drag.x - x1) * 0.5);
                return (
                  <path d={`M ${x1} ${y1} C ${x1 + dx} ${y1}, ${drag.x - dx} ${drag.y}, ${drag.x} ${drag.y}`}
                        fill="none" stroke="#f0a93c" strokeWidth="1.75"
                        strokeDasharray="5 5" opacity="0.65"
                        style={{ pointerEvents: "none" }} />
                );
              })()}
            </svg>
          </div>
        )}
      </main>

      {treeModal && (
        <div style={S.overlay} onClick={() => setTreeModal(null)}>
          <div style={S.modal} onClick={e => e.stopPropagation()}>
            <label style={S.modalLabel}>
              {treeModal.mode === "new" ? "New tree" : "Rename tree"}
            </label>
            <input autoFocus value={treeModal.text} placeholder="Tree name"
                   onChange={e => setTreeModal(m => ({ ...m, text: e.target.value }))}
                   onKeyDown={e => e.key === "Enter" && commitTreeModal()}
                   style={S.modalInput} />
            <div style={S.modalRow}>
              <button onClick={commitTreeModal} style={S.btn}>
                {treeModal.mode === "new" ? "Create" : "Save"}
              </button>
              <button onClick={() => setTreeModal(null)} style={S.btnGhost}>Cancel</button>
            </div>
          </div>
        </div>
      )}

      {editing && (
        <div style={S.overlay} onClick={() => setEditing(null)}>
          <div style={S.modal} onClick={e => e.stopPropagation()}>
            <label style={S.modalLabel}>Rename task</label>
            <input autoFocus value={editText}
                   onChange={e => setEditText(e.target.value)}
                   onKeyDown={e => e.key === "Enter" && commitEdit()}
                   style={S.modalInput} />
            <div style={S.modalRow}>
              <button onClick={commitEdit} style={S.btn}>Save</button>
              <button onClick={() => setEditing(null)} style={S.btnGhost}>Cancel</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

  /* workspace */

    boxShadow: "0 24px 60px rgba(10,14,22,0.45)",
  },
  modalLabel: {
    fontFamily: MONO, display: "block", fontSize: "var(--t-micro)", letterSpacing: "0.09em",
    textTransform: "uppercase", color: "var(--text3)", marginBottom: "var(--s3)",

  modalInput: {

    border: "1px solid var(--line2)", borderRadius: "var(--r-ctl)",

  modalRow: { display: "flex", gap: "var(--s2)", marginTop: "var(--s4)" },
  btn: {
    fontFamily: SANS, padding: "var(--s3) var(--s5)", fontSize: "var(--t-small)", fontWeight: 600,
    border: "1px solid var(--amber)", borderRadius: "var(--r-ctl)",

  btnGhost: {

ReactDOM.createRoot(document.getElementById("root")).render(<TechTree />);
